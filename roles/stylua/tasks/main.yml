---
- name: Ensure local bin directory exist
  ansible.builtin.file:
    state: directory
    mode: "0755"
    path: "{{ ansible_user_dir }}/.local/bin"

- name: Check if stylua is already installed
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.local/bin/stylua"
  register: stylua_binary

- name: Ensure stylua is installed
  ansible.builtin.unarchive:
    src: "https://github.com/JohnnyMorganz/StyLua/releases/download/{{ stylua_version }}/stylua-linux-x86_64.zip"
    dest: "{{ ansible_user_dir }}/.local/bin"
    remote_src: true
  when: not stylua_binary.stat.exists
