---
- name: "Clone dotfiles bare repository"
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    bare: true
    dest: "{{ dotfiles_repo_dest }}"
    version: "{{ dotfiles_version }}"
  register: repo

- name: "Ensure bare repository contents are present"
  ansible.builtin.command:
    cmd: "/usr/bin/git --git-dir={{ dotfiles_repo_dest }} --work-tree={{ dotfiles_work_tree }} checkout -f"
  changed_when: true
  when: repo.changed

- name: "Ensure untracked config files do not show"
  ansible.builtin.command:
    cmd: "/usr/bin/git --git-dir={{ dotfiles_repo_dest }} --work-tree={{ dotfiles_work_tree }} config --local status.showUntrackedFiles no"
  changed_when: false
  when: repo.changed

